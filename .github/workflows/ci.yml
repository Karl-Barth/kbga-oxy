name: CI

# Compile the plugin against the compile-only oXygen API stubs and run the offline
# sanity checks (ManualTest) on every push and pull request. oXygen itself cannot be
# redistributed, so the real oxygen.jar is only used by the local ./build.sh + ./test/run.sh;
# the stubs in ci/oxygen-stubs/ carry matching signatures and the tests drive WSOptionsStorage
# through a java.lang.reflect.Proxy, so no real oXygen is needed here.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Compile against API stubs and run offline tests
        run: |
          set -euo pipefail

          # Compile the API stubs, then the plugin against them (JDK 8 → Java 8 bytecode).
          mkdir -p build/stubs build/classes build/test
          find ci/oxygen-stubs -name '*.java' > build/stub-sources.txt
          javac -d build/stubs @build/stub-sources.txt
          find src/main/java -name '*.java' > build/sources.txt
          javac -encoding UTF-8 -cp build/stubs -d build/classes @build/sources.txt

          # Compile and run the offline sanity checks.
          javac -encoding UTF-8 -cp "build/stubs:build/classes" -d build/test test/ManualTest.java
          java -cp "build/stubs:build/classes:build/test" ch.kr.kbga.oxy.ManualTest
